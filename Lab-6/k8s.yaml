apiVersion: apps/v1
kind: Deployment
metadata:
  name: lr-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lr-app
  template:
    metadata:
      labels:
        app: lr-app
    spec:
      containers:
      - name: lr-container
        image: lr-service:v1
        imagePullPolicy: Never # Forces Minikube to use the local image
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: lr-service
spec:
  type: NodePort
  selector:
    app: lr-app
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30001
